name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install .

      - name: Compile package
        run: python -m compileall -q file_organizer

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Smoke-test installed CLI
        run: file-organizer --help

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build tools
        run: python -m pip install build ruff
      - name: Lint
        run: |
          ruff format --check file_organizer tests
          ruff check .
      - name: Build wheel and source archive
        run: python -m build
      - name: Smoke-test wheel
        run: |
          python -m venv /tmp/file-organizer-smoke
          /tmp/file-organizer-smoke/bin/python -m pip install dist/*.whl
          /tmp/file-organizer-smoke/bin/file-organizer --version
